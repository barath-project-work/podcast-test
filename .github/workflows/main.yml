name: Generate Podcast Feeds

on:
  push:
    branches:
      - main # Or your default branch

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. Grant write permission to the GITHUB_TOKEN
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Updated to v4 for better reliability

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Feed Generator
        run: python feed.py

      - name: Push Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email "github-actions@github.com" # Added quotes
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Modified Feed" # Prevents failing if there are no changes
          git push
